<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Deckle Match</title>
  <style>
    /* Strict Black & White Theme */
    :root {
      --black: #000000;
      --white: #ffffff;
      --border-thick: 3px solid #000000;
      --border-thin: 1px solid #000000;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { background: var(--white); color: var(--black); min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    
    .header { 
      background: var(--black); 
      color: var(--white); 
      padding: 20px; 
      text-align: center; 
      font-weight: 900; 
      font-size: 22px; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
    }
    
    .main { display: grid; grid-template-columns: 320px 1fr; padding: 20px; gap: 24px; align-items: start; }
    
    .sidebar { border: var(--border-thick); padding: 20px; background: var(--white); }
    .sidebar label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }
    
    input[type="file"] { 
      width: 100%; padding: 12px; margin-bottom: 20px; 
      border: var(--border-thin); background: var(--white); cursor: pointer;
    }
    
    button { 
      width: 100%; padding: 16px; margin-bottom: 12px; 
      background: var(--black); color: var(--white); 
      border: 2px solid var(--black); font-weight: 900; 
      font-size: 15px; text-transform: uppercase; cursor: pointer; 
      transition: all 0.15s ease;
    }
    button:active { background: var(--white); color: var(--black); }
    
    .btn-secondary { background: var(--white); color: var(--black); }
    .btn-secondary:active { background: var(--black); color: var(--white); }

    .table-container { overflow-x: auto; border: var(--border-thick); }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    th, td { border: var(--border-thin); padding: 14px; text-align: center; }
    th { background: var(--black); color: var(--white); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    tr:nth-child(even) { background: #f5f5f5; }
    
    .highlight-size { font-weight: 900; font-size: 16px; }
    .badge { background: var(--black); color: var(--white); padding: 6px 12px; font-weight: bold; border-radius: 20px; font-size: 14px; }
    
    .empty-state { padding: 40px; text-align: center; font-weight: bold; color: #555; }

    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; padding: 10px; }
    }
  </style>
</head>
<body>

<div class="header">DECKLE MATCH PRO</div>

<div class="main">
  <aside class="sidebar">
    <label>1. Upload Order Data</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="handleFile(this)">
    
    <label>2. Processing</label>
    <button onclick="runCombinationMatch()">Analyze & Match Sizes</button>
    <button class="btn-secondary" onclick="exportData()">Export Matches</button>
  </aside>

  <div class="table-container">
    <table id="resultsTable" style="display:none;">
      <thead>
        <tr>
          <th>Total Size (cm)</th>
          <th>Sets (Min Reels)</th>
          <th>GSM / BF</th>
          <th>Customer Combination</th>
          <th>Size Breakdown</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state">No matches processed yet. Upload a file and run the analysis.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  let rawOrders = [];
  let viewRows = [];

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        
        // Normalize object keys to lowercase to avoid header spelling mismatches
        rawOrders = rows.map(r => {
          const out = {};
          Object.keys(r).forEach(k => { out[k.trim().toLowerCase()] = r[k]; });
          return out;
        });
        
        alert(`Successfully loaded ${rawOrders.length} orders.`);
      } catch (err) {
        alert('Error reading file. Ensure it is a valid Excel or CSV.');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function runCombinationMatch() {
    if (rawOrders.length === 0) {
      alert("Please upload a data file first.");
      return;
    }

    // Group orders by GSM and BF so we only match identical paper specs
    let groups = {};
    rawOrders.forEach(row => {
      let gsm = parseFloat(row.gsm);
      let bf = parseFloat(row.bf);
      let size = parseFloat(row.size);
      let reels = parseFloat(row.reels || row['no of reels'] || row.qty); // Handle variations of 'reels' column
      
      if (isNaN(gsm) || isNaN(bf) || isNaN(size) || isNaN(reels)) return;
      
      let key = `${gsm}_${bf}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push({ customer: row.customer || 'Unknown', gsm, bf, size, reels });
    });

    viewRows = [];

    // Analyze combinations up to 4 orders
    Object.keys(groups).forEach(key => {
      let items = groups[key];
      let n = items.length;

      for (let i = 0; i < n; i++) {
        checkCombo([items[i]]); // 1 Item
        
        for (let j = i + 1; j < n; j++) {
          checkCombo([items[i], items[j]]); // 2 Items
          
          for (let k = j + 1; k < n; k++) {
            checkCombo([items[i], items[j], items[k]]); // 3 Items
            
            for (let l = k + 1; l < n; l++) {
              checkCombo([items[i], items[j], items[k], items[l]]); // 4 Items
            }
          }
        }
      }
    });

    // Sort results by total size descending
    viewRows.sort((a, b) => b.totalSize - a.totalSize);
    renderTable();
  }

  function checkCombo(combo) {
    let totalSize = combo.reduce((sum, item) => sum + item.size, 0);
    
    // Check if within target deckle range (422 to 435)
    if (totalSize >= 422 && totalSize <= 435) {
      let minReels = Math.min(...combo.map(item => item.reels));
      
      viewRows.push({
        totalSize: totalSize,
        sets: minReels,
        gsm_bf: `${combo[0].gsm} / ${combo[0].bf}`,
        customers: combo.map(c => c.customer).join(' + '),
        breakdown: combo.map(c => `${c.size} (${c.reels}R)`).join(' + ')
      });
    }
  }

  function renderTable() {
    const table = document.getElementById('resultsTable');
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    if (viewRows.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'block';
      empty.textContent = "No matches found in the 422–435cm range for this dataset.";
      return;
    }

    tbody.innerHTML = viewRows.map(row => `
      <tr>
        <td class="highlight-size">${row.totalSize}</td>
        <td><span class="badge">${row.sets} Sets</span></td>
        <td>${row.gsm_bf}</td>
        <td>${row.customers}</td>
        <td>${row.breakdown}</td>
      </tr>
    `).join('');

    table.style.display = 'table';
    empty.style.display = 'none';
  }

  function exportData() {
    if (viewRows.length === 0) {
      alert('No data to export. Run a match first.');
      return;
    }
    const ws = XLSX.utils.json_to_sheet(viewRows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Deckle_Matches");
    XLSX.writeFile(wb, "Deckle_Optimization_Export.xlsx");
  }
</script>
</body>
</html>
